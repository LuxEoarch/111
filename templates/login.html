<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 舆情监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .btn-primary {
            background: #667eea;
            border: none;
            padding: 10px;
        }

        .btn-primary:hover {
            background: #5a6fd1;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h3 class="text-center mb-4 fw-bold text-primary">欢迎登录</h3>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger p-2 text-center small">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label text-muted">用户名</label>
                <input type="text" name="username" class="form-control" required placeholder="请输入用户名">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">密码</label>
                <input type="password" name="password" class="form-control" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">立即登录</button>
            <div class="text-center">
                <a href="/register" class="text-decoration-none small text-secondary">没有账号? 去注册</a>
            </div>
        </form>
    </div>
</body>

</html>
